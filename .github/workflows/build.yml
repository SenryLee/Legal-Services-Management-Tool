name: Build Installers

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS Apple Silicon DMG
            artifact_name: legalbiz-macos-arm64-dmg
            artifact_path: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x64 EXE
            artifact_name: legalbiz-windows-x64-exe
            artifact_path: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    name: Publish GitHub release

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Normalize release asset names
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets-normalized
          dmg="$(find release-assets -type f -name '*.dmg' -print -quit)"
          exe="$(find release-assets -type f -name '*.exe' -print -quit)"
          test -n "$dmg"
          test -n "$exe"
          cp "$dmg" "release-assets-normalized/LegalBiz_${version}_macos_aarch64.dmg"
          cp "$exe" "release-assets-normalized/LegalBiz_${version}_windows_x64-setup.exe"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets-normalized/*
          fail_on_unmatched_files: true
          body: |
            ## 安装说明

            **macOS (Apple Silicon)**
            1. 下载 `.dmg` 文件。
            2. 打开后将应用拖入“应用程序”。
            3. 首次打开如提示“未识别开发者”，在「系统设置 → 隐私与安全性」中允许打开。

            **Windows x64**
            1. 下载 `*-setup.exe` 文件。
            2. 双击安装即可。
